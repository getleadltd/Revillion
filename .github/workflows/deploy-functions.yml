name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify token
        run: supabase projects list

      - name: Deploy autopilot
        run: supabase functions deploy autopilot --project-ref pvxndzwaposcttrwkwgd

      - name: Deploy article-review-swarm
        run: supabase functions deploy article-review-swarm --project-ref pvxndzwaposcttrwkwgd

      - name: Deploy other functions
        run: |
          for func in analyze-blog-title generate-blog-content generate-blog-image translate-blog-post meta-capi monitor-seo sitemap process-blog-queue; do
            echo "→ Deploying $func"
            supabase functions deploy "$func" --project-ref pvxndzwaposcttrwkwgd || echo "⚠️ $func failed (non-blocking)"
          done
