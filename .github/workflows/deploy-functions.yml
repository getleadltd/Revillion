name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref pvxndzwaposcttrwkwgd
          for dir in supabase/functions/*/; do
            func=$(basename "$dir")
            echo "Deploying $func..."
            supabase functions deploy "$func" --project-ref pvxndzwaposcttrwkwgd --no-verify-jwt || echo "Warning: $func failed"
          done
