
name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Create theme package
      run: |
        mkdir -p wordpress-theme
        cp -r dist/ wordpress-theme/
        cp style.css wordpress-theme/
        cp index.php wordpress-theme/
        cp functions.php wordpress-theme/
        cp header.php wordpress-theme/
        cp footer.php wordpress-theme/
        cp README.md wordpress-theme/
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: wordpress-theme
        path: wordpress-theme/
